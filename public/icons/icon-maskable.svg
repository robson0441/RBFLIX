<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
  </defs>
  <!-- Background covering full 512x512 with safe boundary margin -->
  <rect width="512" height="512" fill="url(#bgGrad)" />
  
  <!-- Play emblem (Cine theme) within central 60% safe circle -->
  <g transform="translate(216, 196)">
    <path d="M 0 0 L 100 60 L 0 120 Z" fill="url(#grad)" />
  </g>
  
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#grad)" stroke-width="4" opacity="0.3" id="inner-circle" />
</svg>
