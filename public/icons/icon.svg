<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#27272a" stroke-width="8"/>
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#grad)" stroke-width="4" opacity="0.3" filter="url(#glow)" />
  
  <!-- Play emblem (Cine theme) -->
  <g transform="translate(196, 176)">
    <path d="M 0 0 L 140 80 L 0 160 Z" fill="url(#grad)" filter="url(#glow)" />
  </g>
  
  <!-- Sleek Text accent -->
  <text x="256" y="440" font-family="system-ui, -apple-system, sans-serif" font-weight="950" font-size="36" fill="#ffffff" letter-spacing="4" text-anchor="middle" opacity="0.95">RBFLIX</text>
</svg>
